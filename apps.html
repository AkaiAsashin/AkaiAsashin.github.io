<html lang="de">

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AkaiAsashin — Apps</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="profil.png">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <img src="profil.png" alt="AkaiAsashin Logo" class="logo" />
        <span class="name">AkaiAsashin</span>
      </a>

      <nav class="main-nav" aria-label="Hauptnavigation">
        <button class="nav-toggle" aria-expanded="false" aria-controls="nav-list">☰</button>
        <ul id="nav-list" class="nav-list" role="menubar">
          <li><a href="index.html">Home</a></li>
          <li><a href="youtube.html">YouTube</a></li>
          <li><a href="twitch.html">Twitch</a></li>
          <li><a href="music.html">Musik</a></li>
          <li><a href="apps.html" class="active">Apps</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="home-hero">
      <div class="hero-center">
        <h1 class="hero-title">Apps</h1>
        <p class="lead">Vielleicht mache ich irgendwann mal irgendwas</p>
      </div>
    </section>

    <div class="apps-grid">
      <!-- Beispiel-App-Karte mit Google Play Badge -->
      <article class="app-card">
        <img src="app.png" alt="App Screenshot">
        <h3>Deine App</h3>
        <p>Kurze Beschreibung der App. Plattform: Android</p>

        <!-- === Google Play Badge (einfacher Link) ===
             Ersetze APP_ID_HIER_EINSETZEN mit deiner Play-Store App-ID z.B. com.meinname.meineapp -->
        <p style="margin: .75rem;">
          <a href="https://play.google.com/store/apps/details?id=com.lilithgame.hgame"
             target="_blank" rel="noopener noreferrer">
            <img alt="Get it on Google Play"
                 src="https://play.google.com/intl/en_us/badges/images/generic/en_badge_web_generic.png"
                 style="height:60px; border:0;">
          </a>
        </p>

        <p><a href="#" class="btn">Mehr</a></p>
      </article>

      <!-- weitere App-Karten falls nötig -->
    </div>
  </main>

  <footer class="site-footer container">
    <p>© <span id="year"></span> AkaiAsashin</p>
    <p class="milk-note">Apps "abpumpen" — d.h. Kernfunktionen extrahieren und als kleine Utilities anbieten. 🥛</p>
  </footer>

  <script src="common.js"></script>
